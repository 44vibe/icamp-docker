services:

  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /var/www/tree.icamp.tech:/var/www/tree.icamp.tech:ro
      - /var/www/tauprofile.com:/var/www/tauprofile.com:ro
      - /var/www/skillprotocol.com:/var/www/skillprotocol.com:ro
    networks:
      - webnet
    depends_on:
      - icamp
    restart: unless-stopped

  icamp:
    build:
      context: ./i-camp-new-landing-page
      dockerfile: Dockerfile
    container_name: icamp
    expose:
      - "8083"
    env_file:
      - ./i-camp-new-landing-page/.env
    networks:
      - webnet
    restart: unless-stopped

networks:
  webnet:
    driver: bridge
